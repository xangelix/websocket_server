name: Build & Publish OCI Image

# This workflow runs when code is pushed to the main branch OR when a new version tag is created.
on:
  push:
    branches: ["master", "main", "develop", "dev"]
    # Publish semver tags as releases (e.g., v1.2.3)
    tags: ["v*.*.*", "*.*.*"]

env:
  # Use GHCR (GitHub Container Registry)
  REGISTRY: ghcr.io
  # github.repository defaults to user/repo
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    # Sets the permissions granted to the GITHUB_TOKEN for the actions in this job.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-architecture builds (AMD64 & ARM64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx (The modern build engine)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log into GHCR using the automatically provided GitHub token
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatically extract branch names and tags to label the Docker image
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Build and push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          # Push both architectures in a single manifest
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up subsequent builds dramatically
          cache-from: type=gha
          cache-to: type=gha,mode=max
